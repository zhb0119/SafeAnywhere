# SafeAnywhere special-token OPSD.
#
# This branch starts from the merged special-token cold-start SFT checkpoint:
#   uv run --extra opsd python scripts/opsd/merge_lora.py \
#     --base-model runs/sft_special/qwen3_0_6b_safety_think_base \
#     --adapter runs/sft_special/qwen3_0_6b_v1 \
#     --output runs/merged/qwen3_0_6b_sft_special_v1

seed: 20260715
chat_template: qwen3_nothink

model:
  path: runs/merged/qwen3_0_6b_sft_special_v1
  tokenizer_path:
  adapter_path:
  train_mode: lora
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
    modules_to_save:
      - embed_tokens
      - lm_head
    ensure_weight_tying: true
    sparse_token_grad:
      enabled: true
      tokenizer_path: runs/merged/qwen3_0_6b_sft_special_v1
      tokens:
        - <safety_think>
        - </safety_think>
      modules:
        - embed_tokens
        - lm_head
    bias: none
  trust_remote_code: true
  dtype: bf16
  device:

teacher_model:
  path: runs/merged/qwen3_0_6b_sft_special_v1
  trust_remote_code: true
  dtype: bf16

teacher_prompts:
  path: configs/opsd/teacher_prompts_v1.yaml

data:
  train_jsonl: data/UWNSL__SafeChain__train.jsonl
  max_samples:
  label_filter:
  label_ratios:
    vanilla_benign: 0.25
    adversarial_benign: 0.25
    vanilla_harmful: 0.25
    adversarial_harmful: 0.25

generation:
  max_new_tokens: 128
  temperature: 0.7
  top_p: 0.9

loss:
  type: adaptive_kl
  temperature: 1.0
  top_k:
  max_tokens: 128
  adaptive_kl:
    harmful_entropy_low: 0.2
    harmful_entropy_high: 0.5
    harmful_forward_floor: 0.2
    harmful_reverse_floor: 0.2
  structure:
    enabled: true
    tag_search_tokens: 64
    harmful_missing_prefix_tokens: 16
    harmful_open_weight: 8.0
    harmful_block_weight: 4.0
    harmful_close_weight: 5.0
    harmful_first_response_weight: 2.0
    harmful_first_response_tokens: 48
    harmful_after_block_weight: 0.2
    harmful_unclosed_block_tokens: 64
    benign_prefix_tokens: 32
    benign_prefix_weight: 4.0
    benign_body_weight: 0.5
    benign_bad_prefix_suffix_weight: 0.0
  prefix_ce:
    enabled: true
    weight: 0.5
    max_tokens: 48

train:
  output_dir: runs/opsd/qwen3_0_6b_opsd_special_v2
  micro_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  weight_decay: 0.0
  max_grad_norm: 1.0
  max_steps: 300
  max_prompt_tokens: 1536
  max_total_tokens: 2048
  logging_steps: 1
  progress_log_micro_batches: true
  sample_logging_steps: 1
  sample_logging_limit: 1000
  save_steps: 100
  gradient_checkpointing: false
