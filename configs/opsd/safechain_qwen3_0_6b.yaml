# SafeAnywhere first-pass prompt-level OPSD.
#
# By default OPSD continues the LoRA adapter produced by the cold-start SFT
# config. If you use a merged SFT checkpoint instead, set model.path to that
# checkpoint and leave model.adapter_path empty.

seed: 20260715
chat_template: qwen3_nothink

model:
  path: ../models/Qwen3-0.6B
  tokenizer_path:
  adapter_path: runs/qwen3_safeanywhere_lora_sft_v1
  train_mode: lora
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
    bias: none
  trust_remote_code: true
  dtype: bf16
  device:

teacher_prompts:
  path: configs/opsd/teacher_prompts_v1.yaml

data:
  train_jsonl: data/UWNSL__SafeChain__train.jsonl
  max_samples:
  label_filter:
  label_ratios:
    vanilla_benign: 0.25
    adversarial_benign: 0.25
    vanilla_harmful: 0.25
    adversarial_harmful: 0.25

generation:
  max_new_tokens: 384
  temperature: 0.7
  top_p: 0.9

loss:
  type: mixed_kl
  mixed_kl_weight: 0.5
  temperature: 1.0
  top_k:

train:
  output_dir: runs/opsd/qwen3_safeanywhere_opsd_lora_v1
  micro_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5
  weight_decay: 0.0
  max_grad_norm: 1.0
  max_steps: 1000
  max_prompt_tokens: 1536
  max_total_tokens: 2048
  logging_steps: 1
  progress_log_micro_batches: true
  sample_logging_steps: 50
  sample_logging_limit: 1000
  save_steps: 100
  gradient_checkpointing: false
