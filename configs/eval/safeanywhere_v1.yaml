eval_name: safeanywhere_v1

paths:
  eval_dir: build/eval/safeanywhere_715_1502
  eval_input: build/data_build/safeanywhere_sft_v1/sft_val.jsonl
  eval_set_subdir: eval_set
  runs_subdir: runs
  comparisons_subdir: comparisons

models:
  targets:
    - name: base
      kind: hf
      model: ../models/Qwen3-0.6B
    - name: sft
      kind: lora
      base_model: ../models/Qwen3-0.6B
      adapter: runs/sft/qwen3_0_6b_v1
    - name: opsd_step100
      kind: lora
      base_model: runs/merged/qwen3_0_6b_sft_v1
      adapter: runs/opsd/qwen3_0_6b_opsd_v1/checkpoint-step-100
    - name: opsd_step300
      kind: lora
      base_model: runs/merged/qwen3_0_6b_sft_v1
      adapter: runs/opsd/qwen3_0_6b_opsd_v1/checkpoint-step-300

compare:
  reference: base

eval_set:
  include_prefix_direct: true
  sampling:
    # Empty/null means full eval. Set this for a quick balanced smoke test,
    # e.g. max_per_task: 5.
    max_per_task:
    # Per-task limits override max_per_task when set.
    per_task:
      benign_utility: 40
      over_refusal: 40
      harmful_direct: 40 
      prefix_recovery: 40

generation:
  max_new_tokens: 384
  temperature: 0.0
  top_p: 0.9
  thinking_mode: "off"
  dtype: bf16
  device_map: auto
  limit:
  system_prompt:
  output_mode: compact
  include_reference: false
  include_raw_prediction: false
  include_rendered_prompt: false

judge:
  model:
  api_key_env:
  base_url_env:
  model_env:
  max_field_chars:
