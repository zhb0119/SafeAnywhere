dataset_name: safeanywhere_sft_v1
seed: 20260706

paths:
  output_dir: build/data_build/safeanywhere_sft_v1
  safechain_jsonl: data/UWNSL__SafeChain__train.jsonl
  hex_phi_jsonl: data/Harmful-HEx-PHI.jsonl

split:
  val_ratio: 0.10

pipeline:
  tasks:
    - harmful_prefix
  harmful_prefix_sources:
    - safechain_harmful
  finalize: false

tasks:
  safechain:
    total: 1000
    per_label:
      vanilla_benign: 250
      adversarial_benign: 250
      vanilla_harmful: 250
      adversarial_harmful: 250
    safety_think_probability:
      vanilla_benign: 0.20
      adversarial_benign: 0.50
      vanilla_harmful: 1.00
      adversarial_harmful: 1.00
    max_replacements: 100

  harmful_prefix:
    max_replacements: 200
    sources:
      hex_phi:
        prefix_mode: source_excerpt
        total: 600
        depth_counts:
          8: 80
          16: 100
          32: 120
          64: 120
          128: 100
          200: 80
      safechain_harmful:
        prefix_mode: generated_compliance
        total: 300
        depth_counts:
          8: 50
          16: 50
          32: 50
          64: 50
          128: 50
          200: 50
        prefix_type_counts:
          affirmative_prefix: 49
          outline_prefix: 49
          materials_prefix: 41
          source_link_prefix: 34
          roleplay_acceptance_prefix: 49
          code_prefix: 39
          evasion_prefix: 39

teacher:
  provider: deepseek
  api_key_env: DEEPSEEK_API_KEY
  base_url_env: DEEPSEEK_BASE_URL
  model_env: DEEPSEEK_MODEL
  default_base_url: https://api.deepseek.com
  default_model: deepseek-v4-pro
  timeout_env: DEEPSEEK_TIMEOUT
  default_timeout: 120
  temperature: 0.2
  max_tokens: 2000
  max_retries: 3
  response_format: json_object
  thinking: disabled

prefix_teacher:
  max_tokens: 1600

safety_block:
  open_token: "<safety_think>"
  close_token: "</safety_think>"
  max_tokens: 64
  required_fields:
    - risk
    - trigger
    - intent
    - decision
    - plan

validation:
  require_recover_decision: true
  prompt_wrapper_needles:
    - "You are SafeAnywhere, a helpful assistant"
    - "Rules for <safety_think>:"
    - "Current data type: dangerous_prefix."
    - "Already generated assistant prefill, context only and not part of the training target:"
    - "Now output the safe continuation JSON."
    - "Return one valid JSON object only:"

export:
  llamafactory: true
  prefill_separator: "\n"
  train_dataset_yaml: configs/sft/llamafactory/dataset_safeanywhere_sft_v1_train.yaml
  val_dataset_yaml: configs/sft/llamafactory/dataset_safeanywhere_sft_v1_val.yaml
