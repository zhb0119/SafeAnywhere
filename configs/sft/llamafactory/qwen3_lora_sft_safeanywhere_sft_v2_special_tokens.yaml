# Run scripts/sft/add_safety_think_special_tokens.py before starting this branch.
model: runs/sft_special/qwen3_0_6b_safety_think_base
model_class: llm
trust_remote_code: true

template: safeanywhere_qwen3_nothink

peft_config:
  name: lora
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: all
  modules_to_save:
    - embed_tokens
    - lm_head
  ensure_weight_tying: true
  sparse_token_grad:
    enabled: true
    tokenizer_path: runs/sft_special/qwen3_0_6b_safety_think_base
    tokens:
      - <safety_think>
      - </safety_think>
    modules:
      - embed_tokens
      - lm_head
  safeanywhere_boundary_loss:
    enabled: true
    open_weight: 40.0
    close_weight: 8.0
    block_weight: 2.0
    tokens:
      open: <safety_think>
      close: </safety_think>
  bias: none

kernel_config:
  name: auto
  include_kernels: auto

train_dataset: configs/sft/llamafactory/dataset_safeanywhere_sft_v1_train.yaml

output_dir: runs/sft_special/qwen3_0_6b_v2
micro_batch_size: 1
global_batch_size: 8
cutoff_len: 2048
learning_rate: 1.0e-4
num_train_epochs: 6
max_grad_norm: 1.0
logging_steps: 5
save_epochs: 1.0
save_total_limit: 3
bf16: true
batching_workers: 0
seed: 20260706
